<!DOCTYPE html>
<html>
<head>
    <title>NAU Directory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'IBM Plex Sans', sans-serif;
            background: #F8F2E1;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            padding: 30px 30px 12px;
            margin-bottom: 2px; /* tighter spacing below header */
            background: transparent;
            border-radius: 0;
            box-shadow: none;
        }

        .title-line {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            column-gap: 12px;
            row-gap: 2px;
            margin-bottom: 4px; /* adds small spacing below when stacked */
        }
        .header-top {
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 20px;
        }
        
        h2 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        h3 {
            color: #7f8c8d;
            font-size: 16px;
            font-weight: 400;
        }
        
        .logout { 
            color: #6c757d; 
            text-decoration: none; 
            font-weight: 500;
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            background: #f8f9fa;
            transition: all 0.2s ease;
        }
        
        .logout:hover {
            color: #85592B;
            border-color: #85592B;
            background: white;
        }
        
        .contacts-container {
            padding: 12px 30px 30px;
            margin-top: 0;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
        }

        .directory-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* makes the two sections appear as a single box with unified radii */
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-right: 14px;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contact {
            display: flex;
            flex-direction: column;
            padding: 20px;
            margin-bottom: 12px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: #f8f9fa;
        }
        
        .contact-info {
            flex: 1;
            min-width: 0; /* Allows text to wrap */
        }
        
        /* Mobile responsive adjustments */
        @media (max-width: 600px) {
            .contact {
                padding: 16px;
                position: relative;
            }

            .contact-main {
                flex-wrap: wrap;
                column-gap: 10px;
                row-gap: 16px;
                width: 100%;
            }

            .avatar {
                flex-shrink: 0;
                margin-right: 2px;
            }

            .contact-info {
                flex: 1;
                min-width: 0;
            }

            .copy-btn {
                width: 100%;
                padding: 12px;
                box-sizing: border-box;
                margin: 0;
                flex-basis: 100%;
            }

            .expand-caret {
                position: absolute;
                top: 16px;
                right: 16px;
            }
        }
        
        .name { 
            font-weight: 600; 
            font-size: 18px; 
            color: #2c3e50;
            margin-bottom: 4px;
        }
        
        .phone { 
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace; 
            font-size: 16px; 
            color: #6c757d;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            /* Prevent iOS from auto-converting to tel: links */
            -webkit-text-size-adjust: none;
            text-decoration: none;
        }
        
        .phone:hover {
            color: #094d92;
        }
        
        /* Prevent automatic phone number detection on iOS */
        .phone::before {
            content: '';
        }
        
        .phone::after {
            content: '';
        }
        
        .copy-btn {
            padding: 10px 16px;
            background: #85592B;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s ease;
            margin: 0;
            min-width: 0;
        }

        .copy-btn:hover {
            background: #6e4a23;
        }
        /* Filter UI styles */
        .filter-container {
            padding: 0 30px 20px;
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: flex-end;
            column-gap: 8px;
        }
        
        .reset-filter {
            color: #6c757d;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            white-space: normal;
            max-width: none;
            text-align: right;
            line-height: 1.2;
        }
        
        .reset-filter:hover {
            color: #094d92;
            text-decoration: underline;
        }
        
        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 0px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            color: #2c3e50;
            position: relative;
            user-select: none;
        }
        .filter-pill.active {
            background: #e9ecef;
            border-color: #85592B;
        }

        .filter-pill:hover {
            background: #e9ecef;
            border-color: #85592B;
        }
        
        .filter-pill .caret {
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-left: 4px;
            color: #6c757d;
        }
        
        .filter-pill .caret svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .filter-pill .caret .chevron-down {
            display: block;
        }
        
        .filter-pill .caret .chevron-up {
            display: none;
        }
        
        .filter-pill.open .caret .chevron-down {
            display: none;
        }
        
        .filter-pill.open .caret .chevron-up {
            display: block;
        }
        
        .filter-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            min-width: 100%;
            width: 100%;
            display: none;
        }
        
        .filter-pill.open .filter-dropdown {
            display: block;
        }
        
        .filter-item {
            padding: 12px 20px 12px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #2c3e50;
            border-bottom: 1px solid #f8f9fa;
        }
        
        .filter-item:last-child {
            border-bottom: none;
        }
        
        .filter-item:hover {
            background: #f8f9fa;
        }
        
        /* Contact expandable interests */
        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        
        .contact-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
        }
        
        .expand-caret {
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: inline-block;
            margin-left: 12px;
            flex-shrink: 0;
            color: #6c757d;
            transition: color 0.2s ease;
        }
        
        .expand-caret:hover {
            color: #094d92;
        }
        
        .expand-caret svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .expand-caret .chevron-down {
            display: block;
        }
        
        .expand-caret .chevron-up {
            display: none;
        }
        
        .contact.expanded .expand-caret .chevron-down {
            display: none;
        }
        
        .contact.expanded .expand-caret .chevron-up {
            display: block;
        }
        .chevron-slot {
            width: 24px;
            height: 24px;
            margin-left: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .interests-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e9ecef;
            display: none;
            width: 100%;
        }
        
        .contact.expanded .interests-section {
            display: block;
        }
        
        .bio-prompt {
            font-size: 12px;
            color: #999;
            margin: 0 0 6px 0;
        }

        .bio-text {
            font-family: 'IBM Plex Serif', serif;
            font-size: 20px;
            color: #2c3e50;
            line-height: 1.4;
            margin: 0;
        }
        
        .contact.expanded .contact-header {
            flex-direction: row;
            align-items: flex-start;
            width: 100%;
        }
        
        .contact.expanded .contact-main {
            width: 100%;
        }
        
        .contact.expanded .interests-section {
            margin-left: 0;
            padding-left: 0;
            text-align: left;
        }
        
        .interest-category {
            margin-bottom: 20px;
        }
        
        .interest-category-title {
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        
        .interest-item {
            font-size: 14px;
            margin-bottom: 0;
            padding-left: 24px;
            position: relative;
            line-height: 1.5;
        }
        
        .interest-item.interested {
            color: #2c3e50;
        }
        
        .interest-item.not-interested {
            color: #999;
            text-decoration: line-through;
        }
        
        .interest-item::before {
            position: absolute;
            left: 0;
            top: 0.1em;
            line-height: inherit;
        }
        
        .interest-item.interested::before {
            content: "✅";
        }

        .interest-item.not-interested::before {
            content: "❌";
        }

        #photoModal {
            display: none;
            position: fixed;
            inset: 0;
            background: #333;
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        #photoModal.open {
            display: flex;
        }

        #photoModalImg {
            max-width: 85vw;
            max-height: 85vh;
            border-radius: 8px;
            object-fit: contain;
        }

        #photoModalClose {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 36px;
            line-height: 1;
            cursor: pointer;
            width: auto;
            padding: 0 8px;
            font-weight: 300;
        }

        #photoModalClose:hover {
            background: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="directory-card">
        <div class="header">
            <div class="header-top">
                <div>
                    <div class="title-line">
                        <h2>Member Directory</h2>
                    </div>
                </div>
                <a href="/logout" class="logout">Logout</a>
            </div>
            
        </div>
        
        
        <div class="contacts-container">
            {% for attendee in attendees %}
            <div class="contact" data-phone="{{ attendee.phone }}">
                <div class="contact-header">
                    <div class="contact-main">
                        {% if attendee.photo_url %}
                        <div class="avatar avatar-photo" onclick="openPhotoModal('{{ attendee.photo_url }}', '{{ attendee.name }}')" style="cursor:pointer;"><img src="{{ attendee.photo_url }}" alt="{{ attendee.name }}"></div>
                        {% else %}
                        <div class="avatar" data-name="{{ attendee.name }}"></div>
                        {% endif %}
                        <div class="contact-info">
                            <div class="name">{{ attendee.name }}</div>
                            <div class="phone" onclick="trackPhoneClick('{{ attendee.phone }}', '{{ attendee.name }}')">{{ attendee.phone }}</div>
                        </div>
                        <button class="copy-btn" onclick="copyToClipboard('{{ attendee.phone }}', '{{ attendee.phone }}', '{{ attendee.name }}', this)">
                            Copy phone
                        </button>
                    </div>
                    <div class="chevron-slot">
                        {% if attendee.bio %}
                        <span class="expand-caret" onclick="toggleInterests(this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="chevron-down">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                            </svg>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="chevron-up">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 15.75 7.5-7.5 7.5 7.5" />
                            </svg>
                        </span>
                        {% endif %}
                    </div>
                </div>
                {% if attendee.bio %}
                <div class="interests-section">
                    <p class="bio-prompt">Things I enjoy doing</p>
                    <p class="bio-text">{{ attendee.bio }}</p>
                </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        </div>
    </div>

    <div id="photoModal" onclick="closePhotoModal()">
        <button id="photoModalClose" onclick="closePhotoModal()">&times;</button>
        <img id="photoModalImg" src="" alt="" onclick="event.stopPropagation()">
    </div>

    <script>
        function copyToClipboard(text, contactPhone, contactName, button) {
            navigator.clipboard.writeText(text).then(() => {
                fetch('/copy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `phone=${encodeURIComponent(contactPhone)}&name=${encodeURIComponent(contactName)}`
                }).catch(err => console.log('Logging failed:', err));

                // Lock the button width before changing text so it doesn't shrink
                button.style.width = button.offsetWidth + 'px';
                button.textContent = "Copied!";
                setTimeout(() => {
                    button.textContent = "Copy phone";
                    button.style.width = '';
                }, 1500);
            });
        }
        
        function trackPhoneClick(phone, name) {
            fetch('/log-phone-click', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `phone=${encodeURIComponent(phone)}&name=${encodeURIComponent(name)}`
            }).catch(err => console.log('Phone click logging failed:', err));
            window.location.href = `sms:${phone}`;
        }
        
        // Photo modal
        function openPhotoModal(src, name) {
            document.getElementById('photoModalImg').src = src;
            document.getElementById('photoModalImg').alt = name;
            document.getElementById('photoModal').classList.add('open');
            fetch('/log-photo-open', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `name=${encodeURIComponent(name)}`
            }).catch(err => console.log('Photo open logging failed:', err));
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.remove('open');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePhotoModal();
        });

        // Initials avatars
        const avatarColors = [
            '#85592B', '#6B7F5E', '#4A6FA5', '#8B5E6B',
            '#5E7A6B', '#7A5E8B', '#6B6B3A', '#3A6B6B'
        ];
        function hashName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return Math.abs(hash);
        }
        function getInitials(name) {
            return name.split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
        }
        document.querySelectorAll('.avatar[data-name]').forEach(el => {
            const name = el.getAttribute('data-name');
            el.style.backgroundColor = avatarColors[hashName(name) % avatarColors.length];
            el.textContent = getInitials(name);
        });

        // Expandable bio functionality
        function toggleInterests(caretElement) {
            const contact = caretElement.closest('.contact');
            const isExpanding = !contact.classList.contains('expanded');
            contact.classList.toggle('expanded');
            if (isExpanding) {
                const name = contact.querySelector('.name').textContent;
                fetch('/log-bio-expand', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `name=${encodeURIComponent(name)}`
                }).catch(err => console.log('Bio expand logging failed:', err));
            }
        }
        
    </script>
</body>
</html>
