<!DOCTYPE html>
<html>
<head>
    <title>NAU Directory - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'IBM Plex Sans', sans-serif;
            background: #F8F2E1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        h2 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
        }

        @media (max-width: 420px) {
            h2 {
                font-size: 22px;
            }
        }
        
        h3 {
            color: #7f8c8d;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 30px;
        }
        
        .form-group { 
            margin-bottom: 20px; 
        }
        
        input { 
            width: 100%; 
            padding: 14px 16px; 
            font-size: 16px; 
            border: 1px solid #e1e5e9; 
            border-radius: 8px;
            background: white;
            transition: border-color 0.2s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        
        input::placeholder {
            color: #adb5bd;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #85592B;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background: #6e4a23;
        }
        
        .error { 
            color: #dc3545; 
            margin-top: 15px; 
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>NAU Member Directory</h2>

        <form method="post">
            <div class="form-group">
                <input type="tel" name="phone" placeholder="Enter your phone number" required>
            </div>
            <button type="submit">Access Directory</button>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
        </form>
    </div>

    <script>
    </script>
</body>
</html>
